<!--
  Template de card de produto.
  Os placeholders {{...}} são substituídos pela View em tempo de execução.
-->
<div class="col-md-3">
  <div class="card product-card">
    <div class="card-body">
      <h5 class="card-title">{{name}}</h5>
      <h6 class="card-subtitle mb-2 text-muted">{{category}}</h6>
      <p class="card-text">
        <strong>Price:</strong> ${{price}}<br />
        <strong>Color:</strong> {{color}}<br />
      </p>
      <!-- `data-product` guarda o objeto serializado para recuperar no clique -->
      <button class="btn btn-primary buy-now-btn" data-product="{{product}}">
        Buy Now
      </button>
    </div>
  </div>
</div>
